### Job 11: Cleanup

```yaml
name: "deep-research-cleanup"
schedule: "once"
context_from:
  - "deep-research-pass4-execute"
prompt: |
  The final research report is at {OUTPUT_DIR}/report_{TOPIC}_final.md.
  It contains internal research artifacts that must be removed for delivery.
  
  ## Task
  1. Read the final report
  2. Remove all internal research artifacts
  3. Clean up tier tags, evidence labels, counterargument markers
  4. Rewrite transitions for professional tone
  5. Save the cleaned report to {OUTPUT_DIR}/report_{TOPIC}_clean.md
```

## Chaining Strategy

The jobs are chained using `context_from` to pass the output of one job to the next.
This ensures that each job has access to the output of its predecessor.

```
Job 1 (Initial Research)
  ↓ context_from
Job 2 (Quality Assessment)
  ↓ context_from
Job 3 (Pass 1 Meta-Prompt)
  ↓ context_from
Job 4 (Pass 1 Execute)
  ↓ context_from
Job 5 (Pass 2 Meta-Prompt)
  ↓ context_from
Job 6 (Pass 2 Execute)
  ↓ context_from
Job 7 (Pass 3 Meta-Prompt)
  ↓ context_from
Job 8 (Pass 3 Execute)
  ↓ context_from
Job 9 (Pass 4 Meta-Prompt)
  ↓ context_from
Job 10 (Pass 4 Execute)
  ↓ context_from
Job 11 (Cleanup)
```

## Notes

1. Each job runs in a fresh Hermes session with no memory of previous sessions.
2. The `context_from` field ensures that the output of the predecessor job is
   injected into the prompt of the successor job.
3. The `prompt` field contains the actual task instruction for each job.
4. The `{TEMPLATE_PATH}`, `{PLAN_PATH}`, `{TOPIC}`, and `{OUTPUT_DIR}` placeholders
   must be replaced with actual values before running the jobs.

