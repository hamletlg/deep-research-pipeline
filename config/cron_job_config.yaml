# Cron Job Configuration: Deep Research Report Pipeline

This configuration defines the cron jobs needed to run the deep research report
pipeline. Each job is independent and can be chained using `context_from`.

## Job Definitions

### Job 1: Initial Research

```yaml
name: "deep-research-initial"
schedule: "once"
prompt: |
  You are conducting a deep research investigation on "{TOPIC}".
  You have access to the `deep-research-framework` skill which defines the methodology.
  
  ## Research Parameters
  - **Depth:** Level 4
  - **Source Mix:** policy
  - **Time Period:** 2024-2026
  - **Geographic Focus:** EU-27 + UK, Switzerland, Norway, Iceland
  - **Exclusions:** Non-AI digital regulation, consumer AI, military AI
  
  ## Task
  Conduct a comprehensive deep research report on the topic above. Follow the
  deep research framework methodology. Include:
  1. Research persona
  2. PICO framing
  3. Scope boundaries
  4. Long-form prose analysis with inline citation tags [T#]
  5. 2-5 publication-quality charts using matplotlib (save to charts/)
  6. Complete Sources section with tier labels
  
  ## Output
  Save the report to: {OUTPUT_DIR}/report_{TOPIC}.md
```

### Job 2: Quality Assessment

```yaml
name: "deep-research-assessment"
schedule: "once"
context_from:
  - "deep-research-initial"
prompt: |
  A research report on "{TOPIC}" has been produced at {OUTPUT_DIR}/report_{TOPIC}.md.
  You have access to the `deep-research-framework` skill which defines the quality criteria.
  
  ## Task
  1. Read the report at {OUTPUT_DIR}/report_{TOPIC}.md
  2. Load the `deep-research-framework` skill
  3. Evaluate against ALL 10 components (C1-C10)
  4. Score each component (0-10)
  5. Identify strengths and weaknesses
  6. Produce prioritized improvement recommendations
  
  ## Output
  Write TWO files:
  1. {OUTPUT_DIR}/assessment.md — Component-by-component assessment
  2. {OUTPUT_DIR}/improvement_plan.md — Multi-pass improvement plan
```

### Job 3: Pass 1 Meta-Prompt Generation

```yaml
name: "deep-research-pass1-meta"
schedule: "once"
context_from:
  - "deep-research-assessment"
prompt: |
  Use {TEMPLATE_PATH} as a template, review {PLAN_PATH} and write the pass_1_prompt to folder.
```

### Job 4: Pass 1 Execution

```yaml
name: "deep-research-pass1-execute"
schedule: "once"
context_from:
  - "deep-research-pass1-meta"
prompt: |
  Read the pass_1_prompt.md file and execute all tasks listed in it.
```

### Job 5: Pass 2 Meta-Prompt Generation

